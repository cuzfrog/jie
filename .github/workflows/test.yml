name: test

on:
  push:
    branches: [main, "dev_*"]
  pull_request:
    branches: [main, "dev_*"]

jobs:
  test:
    name: bun test + tsc
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Run tests
        run: bun test
